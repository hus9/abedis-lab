<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .paper { fill: #f7f3ec; }
      .raised { fill: #fffdf8; }
      .ink { fill: #1f1b16; }
      .ink-soft { fill: #4a423a; }
      .accent { fill: #d6552b; }
      .accent-line { stroke: #d6552b; }
      .good { fill: #2f7d53; }
      .line { stroke: #e3dccf; stroke-width: 2; fill: none; }
      .label { font-family: 'Fraunces', Georgia, serif; font-weight: 900; fill: #1f1b16; }
      .tag-text { font-family: 'Fraunces', Georgia, serif; font-weight: 700; fill: #fffdf8; }
      .body { font-family: 'Atkinson Hyperlegible', sans-serif; fill: #4a423a; }
    </style>
  </defs>

  <rect width="800" height="400" class="paper"/>

  <!-- Shared exam question, floating top center -->
  <g transform="translate(400,66)">
    <rect x="-110" y="-34" width="220" height="68" rx="12" class="raised" stroke="#1f1b16" stroke-width="4"/>
    <text x="0" y="10" text-anchor="middle" class="label" font-size="40">?</text>
  </g>
  <line x1="400" y1="100" x2="230" y2="150" class="line" stroke-dasharray="5 7"/>
  <line x1="400" y1="100" x2="570" y2="150" class="line" stroke-dasharray="5 7"/>

  <!-- LEFT: textbook, labeled RAG -->
  <g transform="translate(220,240)">
    <!-- open book -->
    <path d="M -95 -30 L -6 -20 L -6 60 L -95 50 Z" class="raised" stroke="#1f1b16" stroke-width="4" stroke-linejoin="round"/>
    <path d="M 95 -30 L 6 -20 L 6 60 L 95 50 Z" class="raised" stroke="#1f1b16" stroke-width="4" stroke-linejoin="round"/>
    <line x1="-6" y1="-20" x2="6" y2="-20" class="line" stroke="#1f1b16" stroke-width="4"/>
    <!-- page lines -->
    <line x1="-78" y1="-8" x2="-20" y2="-3" class="line"/>
    <line x1="-78" y1="8" x2="-20" y2="13" class="line"/>
    <line x1="-78" y1="24" x2="-20" y2="29" class="line"/>
    <line x1="20" y1="-8" x2="78" y2="-13" class="line"/>
    <line x1="20" y1="8" x2="78" y2="3" class="line"/>
    <line x1="20" y1="24" x2="78" y2="19" class="line"/>

    <!-- RAG tag -->
    <g transform="translate(0,110) rotate(-3)">
      <rect x="-70" y="-24" width="140" height="48" rx="10" class="accent" stroke="#1f1b16" stroke-width="3"/>
      <text x="0" y="10" text-anchor="middle" class="tag-text" font-size="26">RAG</text>
    </g>

    <!-- accuracy badge -->
    <g transform="translate(105,-70)">
      <circle r="34" class="good" stroke="#1f1b16" stroke-width="3"/>
      <text x="0" y="-3" text-anchor="middle" fill="#fffdf8" class="label" font-size="20">&lt;3%</text>
      <text x="0" y="15" text-anchor="middle" fill="#fffdf8" class="body" font-size="10">wrong</text>
    </g>
  </g>

  <!-- RIGHT: brain, labeled Fine-Tuning -->
  <g transform="translate(590,240)">
    <!-- brain blob -->
    <path d="M -55 -10
             C -70 -40 -40 -62 -14 -56
             C 2 -68 30 -66 40 -46
             C 62 -44 66 -14 52 2
             C 62 20 50 46 26 48
             C 18 60 -8 60 -18 48
             C -44 52 -64 30 -54 8
             C -66 0 -66 -6 -55 -10 Z"
          class="raised" stroke="#1f1b16" stroke-width="4" stroke-linejoin="round"/>
    <!-- fold lines -->
    <path d="M -30 -30 C -18 -20 -18 -6 -30 4" class="line" stroke="#1f1b16" stroke-width="2.5"/>
    <path d="M 0 -40 C 10 -28 10 -12 0 0 C -6 10 -6 22 4 30" class="line" stroke="#1f1b16" stroke-width="2.5"/>
    <path d="M 26 -20 C 36 -12 36 4 24 12" class="line" stroke="#1f1b16" stroke-width="2.5"/>
    <!-- crack, hinting at catastrophic forgetting -->
    <path d="M -8 -50 L 2 -28 L -10 -18 L 6 8 L -4 26" fill="none" class="accent-line" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Fine-Tuning tag -->
    <g transform="translate(0,110) rotate(2)">
      <rect x="-95" y="-24" width="190" height="48" rx="10" class="accent" stroke="#1f1b16" stroke-width="3"/>
      <text x="0" y="10" text-anchor="middle" class="tag-text" font-size="24">Fine-Tuning</text>
    </g>

    <!-- accuracy badge -->
    <g transform="translate(-105,-70)">
      <circle r="34" class="accent" stroke="#1f1b16" stroke-width="3"/>
      <text x="0" y="-3" text-anchor="middle" fill="#fffdf8" class="label" font-size="20">21%</text>
      <text x="0" y="15" text-anchor="middle" fill="#fffdf8" class="body" font-size="10">wrong</text>
    </g>
  </g>

  <text x="400" y="386" text-anchor="middle" class="body" font-size="16">Same question, two students — one gets a textbook, one just studied hard.</text>
</svg>
