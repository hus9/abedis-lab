<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .paper { fill: #f7f3ec; }
      .ink { fill: #1f1b16; }
      .accent { fill: #d6552b; }
      .line { stroke: #e3dccf; stroke-width: 2; fill: none; }
      .label { font-family: 'Fraunces', Georgia, serif; font-weight: 600; fill: #1f1b16; }
      .sub { font-family: 'Atkinson Hyperlegible', sans-serif; fill: #4a423a; }
    </style>
  </defs>

  <rect width="800" height="400" class="paper"/>

  <!-- Dial: green "safe" zone bending into a red "ruin" zone -->
  <path d="M 70,320 A 190,190 0 0 1 243.4,130.7" fill="none" stroke="#5a8f5f" stroke-width="34" opacity="0.85"/>
  <path d="M 243.4,130.7 A 190,190 0 0 1 450,320" fill="none" stroke="#b23a2e" stroke-width="34" opacity="0.9"/>

  <!-- Boundary marker between optimal and ruin -->
  <line x1="247.8" y1="180.5" x2="241.7" y2="110.8" stroke="#1f1b16" stroke-width="4"/>

  <!-- Needle cranked past optimal, deep into the red -->
  <line x1="260" y1="320" x2="391" y2="228.2" stroke="#1f1b16" stroke-width="6" stroke-linecap="round"/>
  <circle cx="260" cy="320" r="14" class="accent"/>
  <circle cx="260" cy="320" r="14" fill="none" stroke="#1f1b16" stroke-width="2"/>

  <!-- Scale endpoints -->
  <text x="70" y="345" class="sub" font-size="14" text-anchor="middle">0%</text>
  <text x="450" y="345" class="sub" font-size="14" text-anchor="middle">45%+</text>

  <!-- Zone labels -->
  <text x="150" y="235" class="label" font-size="16" fill="#3d5c40">safe</text>
  <text x="355" y="235" class="label" font-size="16" fill="#7a2c22" text-anchor="end">ruin</text>

  <!-- Optimal marker callout -->
  <text x="205" y="92" class="label" font-size="15" text-anchor="middle">OPTIMAL</text>
  <line x1="220" y1="99" x2="243" y2="127" stroke="#1f1b16" stroke-width="1.5"/>

  <!-- Needle reading -->
  <rect x="345" y="195" width="90" height="34" rx="8" fill="#fffdf8" stroke="#e3dccf" stroke-width="1.5"/>
  <text x="390" y="218" class="label" font-size="16" text-anchor="middle" fill="#d6552b">30%</text>

  <text x="260" y="385" class="label" font-size="16" text-anchor="middle">bet size, cranked past optimal</text>

  <!-- Crumbling stack of money beside the dial -->
  <g transform="translate(650,330)">
    <ellipse cx="0" cy="35" rx="70" ry="10" class="ink" opacity="0.08"/>
    <rect x="-65" y="0" width="130" height="24" rx="4" fill="#e3dccf" stroke="#1f1b16" stroke-width="1.5"/>
    <rect x="-65" y="-22" width="130" height="24" rx="4" fill="#f4d9cb" stroke="#1f1b16" stroke-width="1.5"/>
    <g transform="rotate(-8)">
      <rect x="-62" y="-46" width="124" height="24" rx="4" fill="#e3dccf" stroke="#1f1b16" stroke-width="1.5"/>
    </g>
    <g transform="translate(6,-58) rotate(14)">
      <rect x="-58" y="-14" width="116" height="24" rx="4" fill="#f4d9cb" stroke="#1f1b16" stroke-width="1.5"/>
    </g>
    <!-- fragments crumbling away -->
    <g opacity="0.6">
      <rect x="70" y="-75" width="24" height="10" rx="2" fill="#e3dccf" stroke="#1f1b16" stroke-width="1" transform="rotate(25 82 -70)"/>
      <rect x="88" y="-42" width="18" height="8" rx="2" fill="#f4d9cb" stroke="#1f1b16" stroke-width="1" transform="rotate(-15 97 -38)"/>
      <rect x="58" y="-95" width="14" height="7" rx="2" fill="#e3dccf" stroke="#1f1b16" stroke-width="1" transform="rotate(40 65 -91.5)"/>
    </g>
  </g>
</svg>
