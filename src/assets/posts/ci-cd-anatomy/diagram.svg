<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .paper { fill: #f7f3ec; }
      .raised { fill: #fffdf8; }
      .ink { fill: #1f1b16; }
      .ink-soft { fill: #4a423a; }
      .accent { fill: #d6552b; }
      .good { fill: #2f7d53; }
      .line { stroke: #e3dccf; stroke-width: 2; fill: none; }
      .label { font-family: 'Fraunces', Georgia, serif; font-weight: 900; fill: #1f1b16; }
      .stage-label { font-family: 'Atkinson Hyperlegible', sans-serif; font-weight: 700; fill: #1f1b16; }
      .body { font-family: 'Atkinson Hyperlegible', sans-serif; fill: #4a423a; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" class="ink-soft"/>
    </marker>
  </defs>

  <rect width="800" height="420" class="paper"/>

  <text x="400" y="46" text-anchor="middle" class="label" font-size="24">Commit to production: one chain, seven gates</text>

  <!-- the track line -->
  <line x1="60" y1="150" x2="740" y2="150" class="line" stroke="#d8cfbd" stroke-width="4"/>

  <!--
    7 stages evenly spaced along x = 90..710
    stage centers: 90, 194, 298, 402, 506, 610, 710(adjust)
  -->

  <!-- Stage 1: Commit (passed, good) -->
  <g transform="translate(90,150)">
    <circle r="30" class="good"/>
    <text y="6" text-anchor="middle" font-size="20" fill="#fffdf8" class="label">&#10003;</text>
    <text y="52" text-anchor="middle" class="stage-label" font-size="15">Commit</text>
  </g>
  <line x1="126" y1="150" x2="158" y2="150" stroke="#4a423a" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Stage 2: Build (passed) -->
  <g transform="translate(194,150)">
    <circle r="30" class="good"/>
    <text y="6" text-anchor="middle" font-size="20" fill="#fffdf8" class="label">&#10003;</text>
    <text y="52" text-anchor="middle" class="stage-label" font-size="15">Build</text>
  </g>
  <line x1="230" y1="150" x2="262" y2="150" stroke="#4a423a" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Stage 3: Unit test (passed) -->
  <g transform="translate(298,150)">
    <circle r="30" class="good"/>
    <text y="6" text-anchor="middle" font-size="20" fill="#fffdf8" class="label">&#10003;</text>
    <text y="52" text-anchor="middle" class="stage-label" font-size="15">Unit test</text>
  </g>
  <line x1="334" y1="150" x2="366" y2="150" stroke="#4a423a" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Stage 4: Integration test — THIS is where it breaks -->
  <g transform="translate(402,150)">
    <circle r="34" class="raised" stroke="#d6552b" stroke-width="5"/>
    <text y="7" text-anchor="middle" font-size="24" fill="#d6552b" class="label">&#10005;</text>
    <text y="56" text-anchor="middle" class="stage-label" font-size="15">Integration test</text>
  </g>

  <!-- broken line + stop sign right after stage 4 -->
  <line x1="440" y1="150" x2="466" y2="150" stroke="#d6552b" stroke-width="3" stroke-dasharray="2 8"/>

  <!-- stop sign octagon -->
  <g transform="translate(500,150)">
    <polygon points="-26,-11 -11,-26 11,-26 26,-11 26,11 11,26 -11,26 -26,11"
      class="accent" stroke="#1f1b16" stroke-width="3"/>
    <text y="8" text-anchor="middle" font-size="18" fill="#fffdf8" class="label">STOP</text>
  </g>
  <text x="500" y="200" text-anchor="middle" class="body" font-size="13">caught here —</text>
  <text x="500" y="218" text-anchor="middle" class="body" font-size="13">goes no further</text>

  <!-- remaining stages, grayed out / not reached -->
  <g opacity="0.35">
    <line x1="534" y1="150" x2="566" y2="150" stroke="#4a423a" stroke-width="3" stroke-dasharray="4 6"/>
    <g transform="translate(602,150)">
      <circle r="28" fill="none" stroke="#4a423a" stroke-width="3"/>
      <text y="50" text-anchor="middle" class="stage-label" font-size="14">Package</text>
    </g>
    <line x1="632" y1="150" x2="658" y2="150" stroke="#4a423a" stroke-width="3" stroke-dasharray="4 6"/>
    <g transform="translate(694,150)">
      <circle r="28" fill="none" stroke="#4a423a" stroke-width="3"/>
      <text y="50" text-anchor="middle" class="stage-label" font-size="13">Staging</text>
    </g>
  </g>

  <!-- Production, far right, faint, unreachable this run -->
  <g opacity="0.25" transform="translate(750,150)">
    <circle r="24" fill="none" stroke="#4a423a" stroke-width="3"/>
    <text y="46" text-anchor="middle" class="stage-label" font-size="12">Prod</text>
  </g>

  <text x="400" y="310" text-anchor="middle" class="body" font-size="16">Each stage is a gate. A broken change stops where it happened —</text>
  <text x="400" y="334" text-anchor="middle" class="body" font-size="16">not three stations later, buried under everything built on top of it.</text>

  <!-- legend -->
  <g transform="translate(230,375)">
    <circle r="9" class="good"/>
    <text x="18" y="5" class="body" font-size="14">passed automatically</text>
  </g>
  <g transform="translate(470,375)">
    <circle r="9" class="raised" stroke="#d6552b" stroke-width="3"/>
    <text x="18" y="5" class="body" font-size="14">failed — pipeline halts</text>
  </g>
</svg>
