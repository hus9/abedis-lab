<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .paper { fill: #f7f3ec; }
      .raised { fill: #fffdf8; }
      .ink { fill: #1f1b16; }
      .ink-soft { fill: #4a423a; }
      .accent { fill: #d6552b; }
      .accent-line { stroke: #d6552b; }
      .line { stroke: #e3dccf; stroke-width: 2; fill: none; }
      .label { font-family: 'Fraunces', Georgia, serif; font-weight: 900; fill: #1f1b16; }
      .sign-text { font-family: 'Fraunces', Georgia, serif; font-weight: 900; fill: #fffdf8; }
      .body { font-family: 'Atkinson Hyperlegible', sans-serif; fill: #4a423a; }
    </style>
  </defs>

  <rect width="800" height="400" class="paper"/>

  <!-- posts holding the sign -->
  <rect x="196" y="60" width="10" height="70" class="ink-soft"/>
  <rect x="594" y="60" width="10" height="70" class="ink-soft"/>

  <!-- shiny sign -->
  <g transform="translate(400,68)">
    <rect x="-230" y="-38" width="460" height="76" rx="10" class="accent" stroke="#1f1b16" stroke-width="4"/>
    <!-- glossy highlight streak -->
    <path d="M -210 -30 L -160 -30 L -200 30 L -230 30 Z" fill="#fffdf8" opacity="0.25"/>
    <path d="M -130 -30 L -100 -30 L -140 30 L -170 30 Z" fill="#fffdf8" opacity="0.2"/>
    <text x="0" y="12" text-anchor="middle" class="sign-text" font-size="34">CI/CD PIPELINE</text>
    <!-- little sparkles suggesting "shiny" -->
    <g class="accent" opacity="0.9">
      <path d="M 250 -46 l 5 12 l 12 5 l -12 5 l -5 12 l -5 -12 l -12 -5 l 12 -5 z" fill="#1f1b16"/>
      <path d="M -260 40 l 4 9 l 9 4 l -9 4 l -4 9 l -4 -9 l -9 -4 l 9 -4 z" fill="#1f1b16"/>
    </g>
  </g>

  <!-- conveyor belt -->
  <g transform="translate(0,230)">
    <rect x="60" y="0" width="680" height="18" rx="9" class="raised" stroke="#1f1b16" stroke-width="3"/>
    <!-- belt segment ticks -->
    <g class="line" stroke="#d8cfbd" stroke-width="2">
      <line x1="100" y1="4" x2="100" y2="14"/>
      <line x1="150" y1="4" x2="150" y2="14"/>
      <line x1="200" y1="4" x2="200" y2="14"/>
      <line x1="250" y1="4" x2="250" y2="14"/>
      <line x1="300" y1="4" x2="300" y2="14"/>
      <line x1="500" y1="4" x2="500" y2="14"/>
      <line x1="550" y1="4" x2="550" y2="14"/>
      <line x1="600" y1="4" x2="600" y2="14"/>
      <line x1="650" y1="4" x2="650" y2="14"/>
      <line x1="700" y1="4" x2="700" y2="14"/>
    </g>
    <!-- belt support legs -->
    <rect x="90" y="18" width="10" height="34" class="ink-soft"/>
    <rect x="700" y="18" width="10" height="34" class="ink-soft"/>
  </g>

  <!-- crate riding the belt, being shoved along -->
  <g transform="translate(390,196)">
    <rect x="-28" y="-22" width="56" height="44" rx="4" class="raised" stroke="#1f1b16" stroke-width="3"/>
    <line x1="-28" y1="-4" x2="28" y2="-4" class="line" stroke="#1f1b16" stroke-width="2"/>
    <line x1="-14" y1="-22" x2="-14" y2="-4" class="line" stroke="#1f1b16" stroke-width="2"/>
    <line x1="14" y1="-22" x2="14" y2="-4" class="line" stroke="#1f1b16" stroke-width="2"/>
  </g>

  <!-- LEFT figure straining at a big hand-crank lever -->
  <g transform="translate(150,300)">
    <!-- lever post + big gear -->
    <circle cx="0" cy="-20" r="26" fill="none" stroke="#1f1b16" stroke-width="4"/>
    <circle cx="0" cy="-20" r="6" class="accent"/>
    <line x1="0" y1="-20" x2="34" y2="-46" stroke="#1f1b16" stroke-width="6" stroke-linecap="round"/>
    <circle cx="34" cy="-46" r="7" class="accent" stroke="#1f1b16" stroke-width="2"/>

    <!-- person body, leaning hard into the crank -->
    <g transform="translate(-38,0)">
      <circle cx="0" cy="-58" r="14" class="raised" stroke="#1f1b16" stroke-width="3"/>
      <path d="M -14 -44 Q 0 -20 26 -30 L 30 -6 Q -4 4 -20 -12 Z" class="ink-soft"/>
      <!-- straining arm reaching to crank handle -->
      <line x1="20" y1="-38" x2="70" y2="-64" stroke="#4a423a" stroke-width="7" stroke-linecap="round"/>
      <!-- legs, braced -->
      <line x1="-8" y1="0" x2="-22" y2="34" stroke="#1f1b16" stroke-width="6" stroke-linecap="round"/>
      <line x1="10" y1="0" x2="24" y2="34" stroke="#1f1b16" stroke-width="6" stroke-linecap="round"/>
      <!-- motion lines: effort -->
      <path d="M -30 -70 q -10 4 -14 14" class="line" stroke="#d6552b" stroke-width="3"/>
      <path d="M -34 -54 q -10 2 -16 10" class="line" stroke="#d6552b" stroke-width="3"/>
    </g>
  </g>

  <!-- RIGHT figure hauling a rope/pulley lever -->
  <g transform="translate(620,300)">
    <!-- pulley wheel -->
    <circle cx="0" cy="-70" r="16" fill="none" stroke="#1f1b16" stroke-width="4"/>
    <line x1="0" y1="-54" x2="0" y2="-10" class="line" stroke="#1f1b16" stroke-width="3"/>

    <g transform="translate(30,0)">
      <circle cx="0" cy="-58" r="14" class="raised" stroke="#1f1b16" stroke-width="3"/>
      <path d="M -20 4 Q -4 -18 14 -44 L 30 -30 Q 20 4 4 14 Z" class="ink-soft"/>
      <!-- arms hauling rope down -->
      <line x1="-6" y1="-40" x2="-14" y2="-10" stroke="#4a423a" stroke-width="7" stroke-linecap="round"/>
      <line x1="16" y1="-40" x2="8" y2="-6" stroke="#4a423a" stroke-width="7" stroke-linecap="round"/>
      <!-- legs braced, leaning back -->
      <line x1="0" y1="12" x2="-14" y2="46" stroke="#1f1b16" stroke-width="6" stroke-linecap="round"/>
      <line x1="10" y1="12" x2="24" y2="44" stroke="#1f1b16" stroke-width="6" stroke-linecap="round"/>
      <!-- effort lines -->
      <path d="M 34 -66 q 10 2 14 12" class="line" stroke="#d6552b" stroke-width="3"/>
    </g>
  </g>

  <text x="400" y="380" text-anchor="middle" class="body" font-size="16">The sign says automatic. The lever room says otherwise.</text>
</svg>
