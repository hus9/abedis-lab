<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <defs>
    <style>
      .display { font-family: Fraunces, Georgia, serif; }
      .body { font-family: 'Atkinson Hyperlegible', system-ui, sans-serif; }
    </style>
  </defs>

  <rect width="1000" height="600" fill="#f7f3ec"/>
  <rect x="60" y="60" width="880" height="480" rx="14" fill="#fffdf8" stroke="#e3dccf"/>
  <text x="500" y="120" text-anchor="middle" class="display" font-size="28" fill="#1f1b16">Reasoning effort — a dial, not a switch</text>

  <!-- dial -->
  <g transform="translate(500,340)">
    <circle r="170" fill="#f4d9cb" stroke="#d6552b" stroke-width="3"/>
    <circle r="170" fill="none" stroke="#e3dccf" stroke-width="1"/>

    <!-- five ticks: low, medium, high, max, extra-high, spanning -120deg to 120deg -->
    <g class="body" font-size="16" fill="#1f1b16">
      <!-- tick lines -->
      <g stroke="#4a423a" stroke-width="3">
        <line x1="0" y1="-170" x2="0" y2="-150" transform="rotate(-120)"/>
        <line x1="0" y1="-170" x2="0" y2="-150" transform="rotate(-60)"/>
        <line x1="0" y1="-170" x2="0" y2="-150" transform="rotate(0)"/>
        <line x1="0" y1="-170" x2="0" y2="-150" transform="rotate(60)"/>
        <line x1="0" y1="-170" x2="0" y2="-150" transform="rotate(120)"/>
      </g>
      <text x="0" y="0" transform="translate(0,-195) rotate(0)" text-anchor="middle">low</text>
      <text text-anchor="middle" transform="rotate(-60) translate(0,-195) rotate(60)">medium</text>
      <text text-anchor="middle" transform="rotate(-120) translate(0,-195) rotate(120)">high</text>
      <text text-anchor="middle" transform="rotate(60) translate(0,-195) rotate(-60)">max</text>
      <text text-anchor="middle" transform="rotate(120) translate(0,-195) rotate(-120)" fill="#d6552b" font-weight="bold">extra-high</text>
    </g>

    <!-- needle pointing to "extra-high" setting, a five-gears day -->
    <g transform="rotate(120)">
      <line x1="0" y1="0" x2="0" y2="-140" stroke="#d6552b" stroke-width="6" stroke-linecap="round"/>
    </g>
    <circle r="16" fill="#d6552b"/>
  </g>

  <text x="500" y="555" text-anchor="middle" class="body" font-size="18" fill="#4a423a">Low = quick pulse. Extra-high = save it for the tough stuff.</text>
</svg>
