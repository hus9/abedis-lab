<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <style>
      .display { font-family: Fraunces, Georgia, serif; }
      .body { font-family: 'Atkinson Hyperlegible', system-ui, sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="675" fill="#f7f3ec"/>

  <!-- scoreboard panel -->
  <rect x="80" y="80" width="1040" height="515" rx="14" fill="#fffdf8" stroke="#e3dccf"/>
  <text x="600" y="150" text-anchor="middle" class="display" font-size="30" fill="#1f1b16">GDPval-AA v2 — knowledge-work benchmark</text>
  <line x1="600" y1="180" x2="600" y2="560" stroke="#e3dccf" stroke-dasharray="6 8"/>

  <!-- Opus 4.8 (large cup, lower score) -->
  <text x="380" y="230" text-anchor="middle" class="body" font-size="22" fill="#4a423a">Opus 4.8 — flagship</text>
  <g transform="translate(300,260)">
    <path d="M0 40 h160 l-14 130 a20 20 0 0 1 -20 18 h-96 a20 20 0 0 1 -20 -18 Z" fill="#e3dccf" stroke="#4a423a" stroke-width="3"/>
    <path d="M160 60 h30 a28 28 0 0 1 0 56 h-24" fill="none" stroke="#4a423a" stroke-width="6"/>
    <rect x="-6" y="20" width="172" height="22" rx="6" fill="#4a423a"/>
  </g>
  <text x="380" y="520" text-anchor="middle" class="display" font-size="56" fill="#4a423a">1615</text>
  <text x="380" y="555" text-anchor="middle" class="body" font-size="18" fill="#4a423a">$5 / $25 per M tokens</text>

  <!-- Sonnet 5 (medium cup, higher score, winner) -->
  <text x="820" y="230" text-anchor="middle" class="body" font-size="22" fill="#1f1b16">Sonnet 5 — mid-tier</text>
  <g transform="translate(760,290)">
    <path d="M0 30 h120 l-10 100 a16 16 0 0 1 -16 14 h-68 a16 16 0 0 1 -16 -14 Z" fill="#f4d9cb" stroke="#d6552b" stroke-width="3"/>
    <path d="M120 46 h22 a20 20 0 0 1 0 40 h-18" fill="none" stroke="#d6552b" stroke-width="6"/>
    <rect x="-6" y="14" width="132" height="18" rx="5" fill="#d6552b"/>
  </g>
  <path d="M840 250 l14 -34 l14 34 l-14 -10 Z" fill="#d6552b"/>
  <text x="820" y="520" text-anchor="middle" class="display" font-size="64" fill="#d6552b">1618</text>
  <text x="820" y="555" text-anchor="middle" class="body" font-size="18" fill="#1f1b16">$2 / $10 per M tokens</text>

  <!-- winner badge -->
  <g transform="translate(940,300)">
    <circle r="34" fill="#d6552b"/>
    <text x="0" y="9" text-anchor="middle" class="display" font-size="26" fill="#fffdf8">1st</text>
  </g>
</svg>
