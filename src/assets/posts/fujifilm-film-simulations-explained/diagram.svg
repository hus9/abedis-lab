<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .paper { fill: #f7f3ec; }
      .ink { fill: #1f1b16; }
      .accent { fill: #d6552b; }
      .line { stroke: #e3dccf; stroke-width: 2; fill: none; }
      .label { font-family: 'Fraunces', Georgia, serif; font-size: 19px; font-weight: 600; fill: #1f1b16; }
      .sub { font-family: 'Atkinson Hyperlegible', sans-serif; font-size: 12.5px; fill: #4a423a; }
    </style>
  </defs>

  <rect width="800" height="400" class="paper"/>
  <line x1="400" y1="30" x2="400" y2="345" class="line"/>

  <!-- LEFT: film camera, physical red glass darkens sky before it ever reaches the film -->
  <g transform="translate(200, 0)">
    <!-- sky, already darkened -->
    <rect x="20" y="55" width="160" height="60" rx="4" fill="#5c3a2e"/>
    <text x="100" y="90" text-anchor="middle" font-family="'Atkinson Hyperlegible', sans-serif" font-size="11" fill="#f7f3ec">darkened sky</text>

    <!-- light rays through glass -->
    <line x1="60" y1="115" x2="90" y2="160" stroke="#5c3a2e" stroke-width="3"/>
    <line x1="100" y1="115" x2="105" y2="160" stroke="#5c3a2e" stroke-width="3"/>
    <line x1="140" y1="115" x2="120" y2="160" stroke="#5c3a2e" stroke-width="3"/>

    <!-- red glass filter disc -->
    <circle cx="100" cy="170" r="22" fill="#b23a2b" opacity="0.85" stroke="#1f1b16" stroke-width="2"/>
    <text x="100" y="205" text-anchor="middle" class="sub">red glass</text>

    <!-- camera body -->
    <rect x="40" y="230" width="120" height="80" rx="10" class="ink"/>
    <rect x="70" y="215" width="40" height="18" rx="4" class="ink"/>
    <circle cx="100" cy="270" r="26" fill="#f7f3ec" stroke="#1f1b16" stroke-width="3"/>
    <circle cx="100" cy="270" r="12" class="ink"/>

    <text x="100" y="345" text-anchor="middle" class="label">Film camera</text>
    <text x="100" y="365" text-anchor="middle" class="sub">glass changes the light itself</text>
  </g>

  <!-- RIGHT: digital camera, sensor captures everything, math darkens sky afterward -->
  <g transform="translate(600, 0)">
    <!-- sky, true/full color, captured as-is -->
    <rect x="20" y="55" width="160" height="60" rx="4" fill="#3b86d6"/>
    <text x="100" y="90" text-anchor="middle" font-family="'Atkinson Hyperlegible', sans-serif" font-size="11" fill="#f7f3ec">every wavelength, unfiltered</text>

    <!-- light rays, straight through, untouched -->
    <line x1="60" y1="115" x2="90" y2="160" stroke="#3b86d6" stroke-width="3"/>
    <line x1="100" y1="115" x2="105" y2="160" stroke="#3b86d6" stroke-width="3"/>
    <line x1="140" y1="115" x2="120" y2="160" stroke="#3b86d6" stroke-width="3"/>

    <!-- open glass — clear circle, nothing there -->
    <circle cx="100" cy="170" r="22" fill="none" stroke="#1f1b16" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="100" y="205" text-anchor="middle" class="sub">clear glass</text>

    <!-- camera body -->
    <rect x="40" y="230" width="120" height="80" rx="10" class="ink"/>
    <rect x="70" y="215" width="40" height="18" rx="4" class="ink"/>
    <circle cx="100" cy="270" r="26" fill="#f7f3ec" stroke="#1f1b16" stroke-width="3"/>
    <circle cx="100" cy="270" r="12" class="ink"/>

    <!-- math applied after, as a small chip icon with arrow from body -->
    <path d="M 160 270 Q 210 270 210 240" stroke="#d6552b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <rect x="196" y="195" width="40" height="40" rx="6" class="accent"/>
    <text x="216" y="220" text-anchor="middle" font-family="'Atkinson Hyperlegible', sans-serif" font-size="18" font-weight="700" fill="#fffdf8">f(x)</text>
    <text x="216" y="255" text-anchor="middle" class="sub">math, after</text>

    <text x="100" y="345" text-anchor="middle" class="label">Digital camera</text>
    <text x="100" y="365" text-anchor="middle" class="sub">software fakes it afterward</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#d6552b"/>
    </marker>
  </defs>
</svg>
