<svg viewBox="0 0 800 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .paper { fill: #f7f3ec; }
      .raised { fill: #fffdf8; }
      .ink { fill: #1f1b16; }
      .ink-soft { fill: #4a423a; }
      .accent { fill: #d6552b; }
      .line { stroke: #e3dccf; stroke-width: 2; fill: none; }
      .label { font-family: 'Fraunces', Georgia, serif; font-size: 20px; font-weight: 900; fill: #1f1b16; }
      .sub { font-family: 'Atkinson Hyperlegible', sans-serif; font-size: 13px; fill: #4a423a; }
      .tag { font-family: 'Atkinson Hyperlegible', sans-serif; font-size: 13px; font-weight: 700; fill: #d6552b; }
    </style>
  </defs>

  <rect width="800" height="440" class="paper"/>

  <text x="400" y="42" text-anchor="middle" class="label">What the depth map thinks is "you"</text>

  <!-- photo frame -->
  <g transform="translate(400, 240)">
    <rect x="-190" y="-140" width="380" height="300" rx="12" class="raised" stroke="#1f1b16" stroke-width="3"/>

    <!-- sharp subject silhouette (head + shoulders + ear + loose hair) -->
    <g fill="#1f1b16" opacity="0.88">
      <path d="M -70 150 L -70 60
               Q -70 -20 0 -40
               Q 66 -22 70 55
               L 78 150 Z"/>
      <!-- ear -->
      <path d="M 62 10 Q 82 8 80 32 Q 78 50 60 44 Z"/>
      <!-- stray hairs -->
      <path d="M -62 -30 Q -78 -10 -66 20" stroke="#1f1b16" stroke-width="3" fill="none" opacity="0.7"/>
      <path d="M -50 -46 Q -70 -34 -64 -6" stroke="#1f1b16" stroke-width="2.5" fill="none" opacity="0.6"/>
    </g>

    <!-- soft blurred background hint -->
    <circle cx="-140" cy="-90" r="26" fill="#e3dccf" opacity="0.6"/>
    <circle cx="130" cy="-110" r="18" fill="#e3dccf" opacity="0.5"/>
    <circle cx="150" cy="90" r="30" fill="#e3dccf" opacity="0.5"/>

    <!-- depth-map blur boundary, dashed accent, cutting through the ear and hair -->
    <path d="M -100 -130 Q -50 -70 -60 -20 Q -68 10 -55 25
             Q -20 -30 20 -35
             Q 55 -18 58 20
             Q 60 35 74 38
             Q 100 20 110 -60
             Q 100 -110 60 -135"
          fill="none" stroke="#d6552b" stroke-width="3.5" stroke-dasharray="9 7"/>

    <!-- callout markers where it fails -->
    <circle cx="70" cy="32" r="7" fill="none" stroke="#d6552b" stroke-width="2.5"/>
    <circle cx="-64" cy="-8" r="7" fill="none" stroke="#d6552b" stroke-width="2.5"/>
  </g>

  <!-- callout labels -->
  <line x1="470" y1="272" x2="560" y2="272" class="line" stroke="#d6552b" stroke-width="2"/>
  <text x="565" y="277" class="tag">ear sliced mid-blur</text>

  <line x1="336" y1="208" x2="240" y2="150" class="line" stroke="#d6552b" stroke-width="2"/>
  <text x="235" y="145" class="tag" text-anchor="end">hair dissolved into background</text>

  <text x="400" y="410" class="sub" text-anchor="middle" font-size="13">No lens drew that line. Software guessed where "far away" begins.</text>
</svg>
