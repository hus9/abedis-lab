<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .paper { fill: #f7f3ec; }
      .raised { fill: #fffdf8; }
      .ink { fill: #1f1b16; }
      .ink-soft { fill: #4a423a; }
      .accent { fill: #d6552b; }
      .line { stroke: #e3dccf; stroke-width: 2; fill: none; }
      .label { font-family: 'Fraunces', Georgia, serif; font-weight: 900; fill: #1f1b16; }
      .stage-label { font-family: 'Atkinson Hyperlegible', sans-serif; font-weight: 700; fill: #1f1b16; }
      .body { font-family: 'Atkinson Hyperlegible', sans-serif; fill: #4a423a; }
    </style>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" class="ink-soft"/>
    </marker>
  </defs>

  <rect width="800" height="420" class="paper"/>

  <text x="400" y="46" text-anchor="middle" class="label" font-size="24">Double the canvas. More than 4x the price.</text>

  <!-- small canvas -->
  <g transform="translate(160,220)">
    <rect x="-50" y="-50" width="100" height="100" fill="none" stroke="#1f1b16" stroke-width="4"/>
    <text x="0" y="80" text-anchor="middle" class="stage-label" font-size="15">1x &#215; 1x</text>
    <text x="0" y="100" text-anchor="middle" class="body" font-size="13">1 unit of area</text>
  </g>

  <line x1="230" y1="220" x2="290" y2="220" stroke="#4a423a" stroke-width="3" marker-end="url(#arrow2)"/>

  <!-- big canvas, double width and height -->
  <g transform="translate(470,220)">
    <rect x="-100" y="-100" width="200" height="200" fill="none" stroke="#1f1b16" stroke-width="4"/>
    <!-- overlay showing the small canvas would tile 4 times -->
    <g stroke="#d8cfbd" stroke-width="2" stroke-dasharray="4 5">
      <line x1="-100" y1="0" x2="100" y2="0"/>
      <line x1="0" y1="-100" x2="0" y2="100"/>
    </g>
    <text x="-50" y="-40" text-anchor="middle" class="body" font-size="13" opacity="0.6">1x</text>
    <text x="50" y="-40" text-anchor="middle" class="body" font-size="13" opacity="0.6">1x</text>
    <text x="-50" y="60" text-anchor="middle" class="body" font-size="13" opacity="0.6">1x</text>
    <text x="50" y="60" text-anchor="middle" class="body" font-size="13" opacity="0.6">1x</text>
    <text x="0" y="130" text-anchor="middle" class="stage-label" font-size="15">2x &#215; 2x</text>
    <text x="0" y="150" text-anchor="middle" class="body" font-size="13">4 units of area</text>
  </g>

  <!-- price bars, small vs big, big growing faster than area -->
  <g transform="translate(0,0)">
    <text x="650" y="120" text-anchor="middle" class="stage-label" font-size="15">Price</text>
    <!-- baseline -->
    <line x1="600" y1="330" x2="740" y2="330" stroke="#1f1b16" stroke-width="3"/>
    <!-- small canvas price bar -->
    <rect x="612" y="300" width="30" height="30" class="ink-soft"/>
    <text x="627" y="345" text-anchor="middle" class="body" font-size="12">1x</text>
    <!-- big canvas price bar: area says 4x, price shown much taller -->
    <rect x="690" y="150" width="30" height="180" class="accent"/>
    <text x="705" y="345" text-anchor="middle" class="body" font-size="12">&gt;4x</text>
  </g>

  <text x="400" y="300" text-anchor="middle" class="body" font-size="15" fill="#4a423a" opacity="0"> </text>

  <text x="400" y="380" text-anchor="middle" class="body" font-size="16">Area scales 4x. You're not buying paint — you're buying presence,</text>
  <text x="400" y="404" text-anchor="middle" class="body" font-size="16">and that scales even faster.</text>
</svg>
