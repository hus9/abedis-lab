<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .paper { fill: #f7f3ec; }
      .ink { fill: #1f1b16; }
      .accent { fill: #d6552b; }
      .line { stroke: #e3dccf; stroke-width: 2; fill: none; }
      .pod { fill: #fffdf8; stroke: #4a423a; stroke-width: 2; }
      .conn { stroke: #4a423a; stroke-width: 2; }
      .fade { stroke: #4a423a; stroke-width: 2; }
      .label { font-family: 'Fraunces', Georgia, serif; font-weight: 600; fill: #1f1b16; }
      .sub { font-family: 'Atkinson Hyperlegible', sans-serif; fill: #4a423a; }
    </style>
    <linearGradient id="fadeOut" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a423a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4a423a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" class="paper"/>

  <!-- Pods, hexagon-ish nodes in a cluster -->
  <g>
    <!-- healthy connected pods (left cluster) -->
    <circle cx="150" cy="120" r="26" class="pod"/>
    <circle cx="240" cy="90" r="26" class="pod"/>
    <circle cx="230" cy="190" r="26" class="pod"/>
    <circle cx="120" cy="220" r="26" class="pod"/>

    <line x1="150" y1="120" x2="240" y2="90" class="conn"/>
    <line x1="150" y1="120" x2="230" y2="190" class="conn"/>
    <line x1="150" y1="120" x2="120" y2="220" class="conn"/>
    <line x1="230" y1="190" x2="120" y2="220" class="conn"/>

    <!-- pods on the right, disconnected / faded -->
    <circle cx="560" cy="110" r="26" class="pod" opacity="0.5"/>
    <circle cx="650" cy="150" r="26" class="pod" opacity="0.5"/>
    <circle cx="600" cy="230" r="26" class="pod" opacity="0.5"/>
    <circle cx="700" cy="240" r="26" class="pod" opacity="0.5"/>

    <!-- lines that fade into blank space instead of connecting -->
    <line x1="230" y1="190" x2="380" y2="170" stroke="url(#fadeOut)" stroke-width="2"/>
    <line x1="120" y1="220" x2="330" y2="260" stroke="url(#fadeOut)" stroke-width="2"/>
    <line x1="560" y1="110" x2="430" y2="140" stroke="url(#fadeOut)" stroke-width="2" transform="rotate(180 495 125)"/>
    <line x1="600" y1="230" x2="450" y2="230" stroke="url(#fadeOut)" stroke-width="2" transform="rotate(180 525 230)"/>

    <!-- small x marks where connections just stop -->
    <text x="380" y="175" text-anchor="middle" class="accent" font-size="18" font-weight="700">×</text>
    <text x="330" y="265" text-anchor="middle" class="accent" font-size="18" font-weight="700">×</text>
  </g>

  <!-- Confused engineer icon staring at a log file -->
  <g transform="translate(400, 300)">
    <!-- head -->
    <circle cx="0" cy="0" r="20" class="pod"/>
    <!-- confused squiggle eyebrows -->
    <path d="M -10 -6 q 4 -6 8 0" class="conn" fill="none" stroke-width="2"/>
    <path d="M 2 -6 q 4 -6 8 0" class="conn" fill="none" stroke-width="2"/>
    <!-- body -->
    <rect x="-16" y="20" width="32" height="34" rx="8" class="pod"/>
    <!-- log file / screen in front -->
    <rect x="-70" y="10" width="46" height="58" rx="4" fill="#fffdf8" stroke="#4a423a" stroke-width="2"/>
    <line x1="-62" y1="24" x2="-32" y2="24" class="line" stroke="#e3dccf"/>
    <line x1="-62" y1="34" x2="-32" y2="34" class="line" stroke="#e3dccf"/>
    <line x1="-62" y1="44" x2="-40" y2="44" class="accent" stroke-width="2"/>
    <line x1="-62" y1="54" x2="-32" y2="54" class="line" stroke="#e3dccf"/>
    <!-- question mark above head -->
    <text x="0" y="-30" text-anchor="middle" class="accent" font-size="26" font-weight="700">?</text>
  </g>

  <text x="120" y="60" class="label" font-size="16">talking fine</text>
  <text x="560" y="70" class="label" font-size="16" opacity="0.6">no healthy upstream</text>
  <text x="400" y="380" text-anchor="middle" class="sub" font-size="13">no error. no log line. just silence.</text>
</svg>
