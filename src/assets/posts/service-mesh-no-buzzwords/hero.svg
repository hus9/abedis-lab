<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .paper { fill: #f7f3ec; }
      .ink { fill: #1f1b16; }
      .accent { fill: #d6552b; }
      .line { stroke: #e3dccf; stroke-width: 2; fill: none; }
      .cable { stroke: #4a423a; stroke-width: 3; fill: none; }
      .label { font-family: 'Fraunces', Georgia, serif; font-weight: 600; fill: #1f1b16; }
      .sub { font-family: 'Atkinson Hyperlegible', sans-serif; fill: #4a423a; }
    </style>
  </defs>

  <rect width="800" height="400" class="paper"/>

  <!-- Tangled mess of network cables -->
  <g fill="none" stroke-linecap="round">
    <path class="cable" d="M 100 320 C 180 260, 140 200, 220 220 C 300 240, 260 300, 340 280" opacity="0.5"/>
    <path class="cable" d="M 460 300 C 520 340, 560 260, 620 300 C 660 325, 700 280, 740 310" opacity="0.5"/>
    <path class="cable" d="M 150 350 C 220 320, 260 360, 320 330" opacity="0.35"/>
    <path class="cable" d="M 480 350 C 540 380, 600 340, 660 360" opacity="0.35"/>
    <path class="cable" d="M 220 260 C 260 220, 320 250, 350 210" opacity="0.3"/>
    <path class="cable" d="M 560 240 C 600 210, 640 250, 690 220" opacity="0.3"/>
  </g>

  <!-- Unplugged cable ends (half of them dangling, disconnected) -->
  <g>
    <circle cx="100" cy="320" r="6" class="ink" opacity="0.6"/>
    <circle cx="340" cy="280" r="6" class="ink" opacity="0.3"/>
    <circle cx="150" cy="350" r="6" class="ink" opacity="0.6"/>
    <circle cx="320" cy="330" r="6" class="ink" opacity="0.3"/>
    <circle cx="460" cy="300" r="6" class="ink" opacity="0.6"/>
    <circle cx="740" cy="310" r="6" class="ink" opacity="0.3"/>
    <circle cx="480" cy="350" r="6" class="ink" opacity="0.6"/>
    <circle cx="660" cy="360" r="6" class="ink" opacity="0.3"/>
  </g>

  <!-- Ground line -->
  <line x1="40" y1="370" x2="760" y2="370" class="line"/>

  <!-- Graduation cap sitting on top of the tangle -->
  <g transform="translate(400, 150)">
    <!-- Cap base (mortarboard top) -->
    <polygon points="0,-20 130,10 0,40 -130,10" class="ink"/>
    <polygon points="0,-20 130,10 0,40 -130,10" fill="#1f1b16" opacity="0.85"/>
    <!-- Cap band -->
    <path d="M -60 20 C -60 55, 60 55, 60 20 L 60 45 C 60 65, -60 65, -60 45 Z" class="ink"/>
    <!-- Button + tassel -->
    <circle cx="0" cy="-20" r="7" class="accent"/>
    <line x1="0" y1="-20" x2="70" y2="30" class="accent" stroke-width="4"/>
    <circle cx="72" cy="34" r="8" class="accent"/>
  </g>

  <!-- CNCF-style badge accent, small, near cap -->
  <circle cx="560" cy="120" r="26" fill="none" class="accent" stroke-width="3"/>
  <text x="560" y="126" text-anchor="middle" class="sub" font-size="11" fill="#d6552b">2025</text>

  <!-- Labels -->
  <text x="400" y="70" text-anchor="middle" class="label" font-size="24">Graduated.</text>
  <text x="400" y="395" text-anchor="middle" class="sub" font-size="14">18% of teams ran a mesh. Then 8% did.</text>
</svg>
