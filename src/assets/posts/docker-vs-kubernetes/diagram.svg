<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .paper { fill: #f7f3ec; }
      .ink { fill: #1f1b16; }
      .accent { fill: #d6552b; }
      .line { stroke: #e3dccf; stroke-width: 2; fill: none; }
      .server-line { stroke: #e3dccf; stroke-width: 2; }
      .label { font-family: 'Fraunces', Georgia, serif; font-weight: 600; fill: #1f1b16; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" class="paper"/>

  <!-- LEFT: Laptop with single container -->
  <g>
    <!-- Laptop base -->
    <rect x="30" y="240" width="140" height="8" rx="2" class="ink"/>

    <!-- Laptop screen -->
    <rect x="45" y="120" width="110" height="120" rx="4" class="line" stroke-width="3"/>

    <!-- Screen fill (slightly different) -->
    <rect x="50" y="125" width="100" height="110" fill="#fffdf8"/>

    <!-- Container on screen -->
    <rect x="65" y="155" width="70" height="60" rx="3" class="line" stroke-width="2"/>
    <rect x="70" y="165" width="60" height="6" class="accent" rx="1"/>

    <!-- Container label -->
    <text x="100" y="200" class="label" font-size="11" text-anchor="middle">app</text>

    <!-- Laptop label -->
    <text x="100" y="290" class="label" font-size="16" text-anchor="middle">Laptop</text>
    <text x="100" y="310" font-family="'Atkinson Hyperlegible'" font-size="11" fill="#4a423a" text-anchor="middle">1 container</text>
  </g>

  <!-- RIGHT: Kubernetes cluster (many servers, many containers) -->
  <g>
    <!-- Three servers -->
    <!-- Server 1 -->
    <rect x="480" y="80" width="80" height="150" rx="4" class="line" stroke-width="2" fill="#fffdf8"/>
    <circle cx="520" cy="100" r="8" class="accent"/>
    <!-- Containers on server 1 -->
    <rect x="495" y="125" width="50" height="30" rx="2" class="line" stroke-width="1.5"/>
    <rect x="495" y="165" width="50" height="30" rx="2" class="line" stroke-width="1.5"/>

    <!-- Server 2 -->
    <rect x="590" y="100" width="80" height="130" rx="4" class="line" stroke-width="2" fill="#fffdf8"/>
    <circle cx="630" cy="120" r="8" class="accent"/>
    <!-- Containers on server 2 -->
    <rect x="605" y="145" width="50" height="25" rx="2" class="line" stroke-width="1.5"/>
    <rect x="605" y="180" width="50" height="25" rx="2" class="line" stroke-width="1.5"/>

    <!-- Server 3 -->
    <rect x="700" y="90" width="80" height="140" rx="4" class="line" stroke-width="2" fill="#fffdf8"/>
    <circle cx="740" cy="110" r="8" class="accent"/>
    <!-- Containers on server 3 -->
    <rect x="715" y="135" width="50" height="28" rx="2" class="line" stroke-width="1.5"/>
    <rect x="715" y="173" width="50" height="28" rx="2" class="line" stroke-width="1.5"/>

    <!-- Connection lines between servers -->
    <line x1="560" y1="180" x2="590" y2="180" class="line" stroke-width="1" opacity="0.5"/>
    <line x1="670" y1="175" x2="700" y2="175" class="line" stroke-width="1" opacity="0.5"/>

    <!-- Cluster label -->
    <text x="610" y="290" class="label" font-size="16" text-anchor="middle">Kubernetes Cluster</text>
    <text x="610" y="310" font-family="'Atkinson Hyperlegible'" font-size="11" fill="#4a423a" text-anchor="middle">many servers, auto-scaled containers</text>
  </g>

  <!-- Arrow between -->
  <line x1="210" y1="160" x2="460" y2="160" class="accent" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="335" y="145" font-family="'Atkinson Hyperlegible'" font-size="12" fill="#4a423a" text-anchor="middle">scale</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" class="accent"/>
    </marker>
  </defs>
</svg>
