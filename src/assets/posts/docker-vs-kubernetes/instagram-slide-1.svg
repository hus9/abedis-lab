<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #f7f3ec; }
      .accent { fill: #d6552b; }
      .ink { fill: #1f1b16; }
      .title { font-family: 'Fraunces', Georgia, serif; font-size: 72px; font-weight: 900; fill: #1f1b16; }
      .subtitle { font-family: 'Atkinson Hyperlegible', sans-serif; font-size: 32px; fill: #4a423a; }
    </style>
  </defs>

  <rect width="1080" height="1080" class="bg"/>

  <!-- Bold accent bar -->
  <rect width="1080" height="160" class="accent"/>

  <!-- Hook text -->
  <text x="540" y="280" class="title" text-anchor="middle">They're not</text>
  <text x="540" y="370" class="title" text-anchor="middle">rivals.</text>

  <!-- Visual: interlocking shapes -->
  <g opacity="0.3">
    <circle cx="250" cy="600" r="120" class="ink" fill="none" stroke-width="8"/>
    <circle cx="830" cy="600" r="120" class="ink" fill="none" stroke-width="8"/>
    <rect x="450" y="480" width="180" height="240" rx="20" class="ink" fill="none" stroke-width="8"/>
  </g>

  <!-- Bottom caption -->
  <text x="540" y="950" class="subtitle" text-anchor="middle">Docker + Kubernetes = a relay team</text>
</svg>
