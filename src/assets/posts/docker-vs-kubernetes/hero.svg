<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .paper { fill: #f7f3ec; }
      .ink { fill: #1f1b16; }
      .accent { fill: #d6552b; }
      .line { stroke: #e3dccf; stroke-width: 2; fill: none; }
      .label { font-family: 'Fraunces', Georgia, serif; font-size: 18px; font-weight: 600; fill: #1f1b16; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" class="paper"/>

  <!-- Water/horizon -->
  <ellipse cx="600" cy="320" rx="200" ry="40" fill="#e3dccf" opacity="0.3"/>

  <!-- Ports in background (left) -->
  <g opacity="0.2">
    <rect x="20" y="180" width="25" height="120" class="ink"/>
    <rect x="50" y="170" width="25" height="130" class="ink"/>
    <rect x="80" y="190" width="25" height="110" class="ink"/>
  </g>

  <!-- Kubernetes port (right) - multiple cranes and containers -->
  <g opacity="0.15">
    <!-- Port structures -->
    <rect x="650" y="120" width="20" height="180" class="ink"/>
    <rect x="690" y="140" width="20" height="160" class="ink"/>
    <circle cx="750" cy="200" r="30" class="line"/>
  </g>

  <!-- Crane structure -->
  <line x1="250" y1="80" x2="250" y2="240" class="line" stroke-width="3"/>
  <line x1="250" y1="85" x2="400" y2="85" class="line" stroke-width="3"/>

  <!-- Crane hook and cable -->
  <line x1="380" y1="85" x2="380" y2="160" class="line" stroke-width="2"/>

  <!-- Docker container (blue-tinted box) -->
  <rect x="320" y="160" width="120" height="100" rx="8" class="line" stroke-width="3"/>

  <!-- Container label -->
  <text x="380" y="215" class="label" text-anchor="middle" font-size="14">DOCKER</text>

  <!-- Accent elements on container -->
  <rect x="330" y="175" width="100" height="8" class="accent" rx="2"/>

  <!-- Arrow pointing right (indicating direction) -->
  <line x1="480" y1="210" x2="580" y2="210" class="accent" stroke-width="3"/>
  <polygon points="580,210 570,200 575,210 570,220" class="accent"/>

  <!-- "Kubernetes port" text label -->
  <text x="680" y="50" class="label" font-size="20">Kubernetes</text>
  <text x="680" y="75" font-family="'Atkinson Hyperlegible'" font-size="12" fill="#4a423a">port authority</text>

  <!-- "Docker" text label -->
  <text x="200" y="50" class="label" font-size="20">Docker</text>
  <text x="200" y="75" font-family="'Atkinson Hyperlegible'" font-size="12" fill="#4a423a">one container</text>
</svg>
