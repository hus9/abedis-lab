<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">A smooth backtest chart climbing confidently, then running off a cliff into a plunge labeled live trading</title>
  <desc id="hero-desc">An illustration of an upward-sloping equity curve that looks flawless in the backtest zone, then reaches the edge of a cliff labeled "live trading" and drops straight down.</desc>
  <defs>
    <style>
      .paper { fill: #f7f3ec; }
      .raised { fill: #fffdf8; }
      .ink { fill: #1f1b16; }
      .ink-soft { fill: #4a423a; }
      .accent { fill: #d6552b; }
      .line { stroke: #e3dccf; stroke-width: 2; fill: none; }
      .label { font-family: 'Fraunces', Georgia, serif; font-weight: 900; fill: #1f1b16; }
      .body { font-family: 'Atkinson Hyperlegible', sans-serif; fill: #4a423a; }
    </style>
  </defs>

  <rect width="800" height="400" class="paper"/>

  <!-- floor / baseline -->
  <line x1="0" y1="340" x2="800" y2="340" class="line"/>

  <!-- zone labels -->
  <text x="200" y="60" text-anchor="middle" class="label" font-size="22">Backtest</text>
  <text x="620" y="60" text-anchor="middle" class="label" font-size="22" fill="#d6552b">Live</text>

  <!-- divider marking the cliff edge -->
  <line x1="470" y1="40" x2="470" y2="340" stroke="#1f1b16" stroke-width="2" stroke-dasharray="6 8" opacity="0.4"/>

  <!-- the confident, smooth climb -->
  <path d="M 40 300 Q 150 260 220 220 Q 300 175 380 140 Q 430 118 470 100"
        fill="none" stroke="#1f1b16" stroke-width="6" stroke-linecap="round"/>

  <!-- small optimistic tick marks along the climb -->
  <g class="ink-soft" opacity="0.5">
    <circle cx="120" cy="278" r="4"/>
    <circle cx="220" cy="220" r="4"/>
    <circle cx="320" cy="163" r="4"/>
    <circle cx="410" cy="126" r="4"/>
  </g>

  <!-- the cliff: line continues then plunges -->
  <path d="M 470 100 Q 500 92 520 96 Q 545 100 552 130 Q 560 200 560 340"
        fill="none" stroke="#d6552b" stroke-width="7" stroke-linecap="round"/>

  <!-- point of failure -->
  <circle cx="520" cy="96" r="9" class="accent"/>

  <!-- cliff face hatching for visual "edge" -->
  <g stroke="#1f1b16" stroke-width="2" opacity="0.25">
    <line x1="470" y1="102" x2="470" y2="340"/>
    <line x1="480" y1="112" x2="480" y2="340"/>
    <line x1="490" y1="122" x2="490" y2="340"/>
  </g>

  <!-- annotation callout -->
  <g transform="translate(600,150) rotate(-3)">
    <rect x="-10" y="-28" width="190" height="56" rx="10" class="accent" stroke="#1f1b16" stroke-width="3"/>
    <text x="85" y="-4" text-anchor="middle" font-family="'Fraunces', Georgia, serif" font-weight="900" font-size="18" fill="#fffdf8">$2.1 billion</text>
    <text x="85" y="16" text-anchor="middle" font-family="'Atkinson Hyperlegible', sans-serif" font-size="12" fill="#fffdf8" opacity="0.9">gone in a month</text>
  </g>

  <!-- resting arrow pointing down the plunge -->
  <g transform="translate(560,300)" opacity="0.7">
    <line x1="0" y1="-30" x2="0" y2="20" stroke="#1f1b16" stroke-width="3" stroke-linecap="round"/>
    <polygon points="0,30 -8,12 8,12" class="ink"/>
  </g>

  <text x="400" y="378" text-anchor="middle" class="body" font-size="16">The backtest never sees the cliff coming — the live market does.</text>
</svg>
