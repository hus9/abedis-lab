<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="diag-title diag-desc">
  <title id="diag-title">Sharpe ratio versus moving-average length, spiking sharply at 50 days and collapsing at 45 and 55, next to a flatter robust line</title>
  <desc id="diag-desc">A chart comparing an overfit strategy, whose Sharpe ratio spikes narrowly at a 50-day moving average and collapses at 45 and 55 days, against a genuinely robust strategy whose performance degrades gently as the setting changes.</desc>
  <defs>
    <style>
      .paper { fill: #f7f3ec; }
      .ink { fill: #1f1b16; }
      .ink-soft { fill: #4a423a; }
      .accent { fill: #d6552b; }
      .accent-soft { fill: #f4d9cb; }
      .good { fill: #2f7d53; }
      .line { stroke: #e3dccf; stroke-width: 2; }
      .label { font-family: 'Fraunces', Georgia, serif; font-weight: 900; fill: #1f1b16; }
      .body { font-family: 'Atkinson Hyperlegible', sans-serif; fill: #4a423a; }
    </style>
  </defs>

  <rect width="800" height="420" class="paper"/>

  <!-- axes -->
  <line x1="90" y1="330" x2="740" y2="330" class="line"/>
  <text x="415" y="372" text-anchor="middle" class="body" font-size="15">moving-average length (days)</text>
  <text x="45" y="200" text-anchor="middle" class="body" font-size="15" transform="rotate(-90,45,200)">Sharpe ratio</text>

  <!-- axis ticks -->
  <text x="330" y="350" text-anchor="middle" class="body" font-size="14">45</text>
  <text x="415" y="350" text-anchor="middle" class="body" font-size="14">50</text>
  <text x="500" y="350" text-anchor="middle" class="body" font-size="14">55</text>

  <!-- danger zone shading under the spike -->
  <path d="M 330 330 L 330 175 Q 415 60 500 175 L 500 330 Z" class="accent-soft" opacity="0.55"/>

  <!-- overfit spike (accent) -->
  <path d="M 130 300 Q 250 290 330 175 Q 415 60 500 175 Q 580 290 700 300"
        fill="none" stroke="#d6552b" stroke-width="6" stroke-linecap="round"/>

  <!-- robust, gently sloped line (good/green) -->
  <path d="M 130 250 Q 300 230 415 220 Q 530 210 700 190"
        fill="none" stroke="#2f7d53" stroke-width="6" stroke-linecap="round"/>

  <!-- peak marker -->
  <circle cx="415" cy="65" r="8" class="accent"/>
  <text x="415" y="40" text-anchor="middle" class="label" font-size="19" fill="#d6552b">2.0</text>

  <!-- collapse markers -->
  <circle cx="330" cy="175" r="6" class="ink"/>
  <circle cx="500" cy="175" r="6" class="ink"/>

  <!-- callout: overfit -->
  <g transform="translate(560,110) rotate(-2)">
    <rect x="-6" y="-24" width="150" height="48" rx="10" class="accent" stroke="#1f1b16" stroke-width="3"/>
    <text x="69" y="-3" text-anchor="middle" font-family="'Fraunces', Georgia, serif" font-weight="900" font-size="16" fill="#fffdf8">Coincidence,</text>
    <text x="69" y="16" text-anchor="middle" font-family="'Atkinson Hyperlegible', sans-serif" font-size="13" fill="#fffdf8" opacity="0.9">not a pattern</text>
  </g>

  <!-- legend -->
  <g transform="translate(560,340)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#d6552b" stroke-width="6" stroke-linecap="round"/>
    <text x="38" y="5" class="body" font-size="14">overfit strategy</text>
  </g>
  <g transform="translate(560,365)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#2f7d53" stroke-width="6" stroke-linecap="round"/>
    <text x="38" y="5" class="body" font-size="14">robust strategy</text>
  </g>
</svg>
