<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .paper { fill: #f7f3ec; }
      .raised { fill: #fffdf8; }
      .ink { fill: #1f1b16; }
      .ink-soft { fill: #4a423a; }
      .accent { fill: #d6552b; }
      .accent-soft { fill: #f4d9cb; }
      .line { stroke: #e3dccf; stroke-width: 2; fill: none; }
      .label { font-family: 'Fraunces', Georgia, serif; font-weight: 700; fill: #1f1b16; }
      .mono { font-family: 'Atkinson Hyperlegible', monospace; fill: #4a423a; }
      .caption { font-family: 'Atkinson Hyperlegible', sans-serif; fill: #4a423a; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" class="accent"/>
    </marker>
  </defs>

  <rect width="800" height="460" class="paper"/>

  <!-- ConfigMap YAML card -->
  <g>
    <rect x="40" y="40" width="220" height="140" rx="10" class="raised" stroke="#e3dccf" stroke-width="2"/>
    <text x="60" y="65" class="label" font-size="16">kind: ConfigMap</text>
    <text x="60" y="90" class="mono" font-size="12">data:</text>
    <text x="60" y="110" class="mono" font-size="12">  theme: "dark"</text>
    <text x="60" y="130" class="mono" font-size="12">  region: "us-east"</text>
  </g>

  <!-- Secret YAML card -->
  <g>
    <rect x="40" y="240" width="220" height="140" rx="10" class="raised" stroke="#e3dccf" stroke-width="2"/>
    <text x="60" y="265" class="label" font-size="16">kind: Secret</text>
    <text x="60" y="290" class="mono" font-size="12">data:</text>
    <!-- readable data inside a thin "base64" wrapper -->
    <rect x="55" y="300" width="190" height="55" rx="6" fill="none" stroke="#d6552b" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="60" y="316" class="mono" font-size="11">  db_pass:</text>
    <text x="70" y="334" class="mono" font-size="11">cGFzc3dvcmQxMjM=</text>
    <text x="70" y="349" class="caption" font-size="10">(readable in one command)</text>
    <text x="245" y="312" class="caption" font-size="10" text-anchor="end">base64</text>
  </g>

  <!-- arrows into etcd -->
  <line x1="260" y1="110" x2="380" y2="230" class="line" stroke="#d6552b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="310" x2="380" y2="250" class="line" stroke="#d6552b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- etcd database icon -->
  <g>
    <ellipse cx="470" cy="220" rx="80" ry="24" class="accent-soft" stroke="#d6552b" stroke-width="2"/>
    <rect x="390" y="220" width="160" height="70" class="accent-soft" stroke="#d6552b" stroke-width="2"/>
    <ellipse cx="470" cy="290" rx="80" ry="24" class="accent-soft" stroke="#d6552b" stroke-width="2"/>
    <ellipse cx="470" cy="220" rx="80" ry="24" class="raised" stroke="#d6552b" stroke-width="2"/>
    <text x="470" y="226" class="label" font-size="16" text-anchor="middle">etcd</text>
    <text x="470" y="330" class="caption" font-size="12" text-anchor="middle">same storage, same plumbing</text>
  </g>

  <!-- padlock icon, unconnected -->
  <g transform="translate(650, 60)">
    <rect x="-30" y="10" width="60" height="46" rx="8" fill="none" stroke="#4a423a" stroke-width="3" stroke-dasharray="5 4"/>
    <path d="M -18 10 L -18 -6 A 18 18 0 0 1 18 -6 L 18 10" fill="none" stroke="#4a423a" stroke-width="3" stroke-dasharray="5 4"/>
    <circle cx="0" cy="30" r="5" fill="#4a423a"/>
    <text x="0" y="80" class="caption" font-size="12" text-anchor="middle">encryption at rest</text>
    <text x="0" y="96" class="caption" font-size="12" text-anchor="middle">(must be enabled</text>
    <text x="0" y="112" class="caption" font-size="12" text-anchor="middle">manually)</text>
  </g>

  <!-- clearly not connected to the flow -->
  <text x="650" y="150" class="caption" font-size="11" text-anchor="middle" fill="#d6552b">not connected — opt-in only</text>
</svg>
