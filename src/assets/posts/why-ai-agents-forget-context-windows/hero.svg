<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">A worker at a desk beside a towering stack of papers, its bottom sheets crumbling to dust</title>
  <desc id="hero-desc">An illustration of a person working calmly at a desk next to an impossibly tall stack of paper labeled 200,000 words, where the lowest sheets are turning to dust and drifting away unnoticed.</desc>
  <defs>
    <style>
      .paper { fill: #f7f3ec; }
      .raised { fill: #fffdf8; }
      .ink { fill: #1f1b16; }
      .ink-soft { fill: #4a423a; }
      .accent { fill: #d6552b; }
      .accent-line { stroke: #d6552b; }
      .line { stroke: #e3dccf; stroke-width: 2; fill: none; }
      .label { font-family: 'Fraunces', Georgia, serif; font-weight: 900; fill: #1f1b16; }
      .body { font-family: 'Atkinson Hyperlegible', sans-serif; fill: #4a423a; }
    </style>
  </defs>

  <rect width="800" height="400" class="paper"/>

  <!-- floor line -->
  <line x1="0" y1="360" x2="800" y2="360" class="line"/>

  <!-- Desk -->
  <g transform="translate(430,300)">
    <rect x="-20" y="0" width="280" height="16" rx="4" class="ink"/>
    <rect x="-4" y="16" width="14" height="44" class="ink"/>
    <rect x="240" y="16" width="14" height="44" class="ink"/>
  </g>

  <!-- Worker, simple seated silhouette, calm -->
  <g transform="translate(500,300)">
    <!-- chair -->
    <rect x="-6" y="18" width="12" height="40" class="ink-soft" opacity="0.4"/>
    <!-- body -->
    <path d="M -34 -8 Q -36 -60 0 -62 Q 36 -60 34 -8 L 34 12 L -34 12 Z" class="raised" stroke="#1f1b16" stroke-width="4"/>
    <!-- head -->
    <circle cx="0" cy="-92" r="26" class="raised" stroke="#1f1b16" stroke-width="4"/>
    <!-- arm reaching toward stack, resting on desk -->
    <path d="M -30 -10 Q -70 0 -95 -6" class="line" stroke="#1f1b16" stroke-width="4" fill="none"/>
    <circle cx="-98" cy="-6" r="7" class="ink"/>
  </g>

  <!-- The stack of papers: 200,000 sheets tall, compressed into a tower -->
  <g transform="translate(230,44)">
    <!-- top cap sheet, crisp -->
    <rect x="-92" y="0" width="184" height="14" rx="3" class="raised" stroke="#1f1b16" stroke-width="3"/>
    <!-- upper body: many crisp horizontal sheet-lines, well defined -->
    <g>
      <rect x="-92" y="14" width="184" height="150" class="raised" stroke="#1f1b16" stroke-width="3"/>
      <line x1="-92" y1="30" x2="92" y2="30" class="line"/>
      <line x1="-92" y1="46" x2="92" y2="46" class="line"/>
      <line x1="-92" y1="62" x2="92" y2="62" class="line"/>
      <line x1="-92" y1="78" x2="92" y2="78" class="line"/>
      <line x1="-92" y1="94" x2="92" y2="94" class="line"/>
      <line x1="-92" y1="110" x2="92" y2="110" class="line"/>
      <line x1="-92" y1="126" x2="92" y2="126" class="line"/>
      <line x1="-92" y1="142" x2="92" y2="142" class="line"/>
      <line x1="-92" y1="158" x2="92" y2="158" class="line"/>
    </g>
    <!-- middle body: lines fade, edges start to blur -->
    <g opacity="0.55">
      <rect x="-92" y="164" width="184" height="110" class="raised" stroke="#1f1b16" stroke-width="2.5"/>
      <line x1="-90" y1="180" x2="90" y2="180" class="line"/>
      <line x1="-90" y1="198" x2="88" y2="198" class="line"/>
      <line x1="-88" y1="216" x2="91" y2="216" class="line"/>
      <line x1="-90" y1="234" x2="89" y2="234" class="line"/>
      <line x1="-89" y1="252" x2="90" y2="252" class="line"/>
    </g>
    <!-- lower body: dissolving into dust, ragged edges -->
    <g opacity="0.28">
      <path d="M -95 274 L 95 274 L 88 320 Q 40 330 0 322 Q -44 332 -90 318 Z" class="raised" stroke="#1f1b16" stroke-width="2"/>
      <line x1="-84" y1="288" x2="80" y2="290" class="line" opacity="0.6"/>
      <line x1="-78" y1="304" x2="74" y2="306" class="line" opacity="0.5"/>
    </g>

    <!-- accent tag marking the size -->
    <g transform="translate(120,80) rotate(-4)">
      <rect x="-6" y="-24" width="150" height="48" rx="10" class="accent" stroke="#1f1b16" stroke-width="3"/>
      <text x="69" y="-2" text-anchor="middle" font-family="'Fraunces', Georgia, serif" font-weight="900" font-size="20" fill="#fffdf8">200,000</text>
      <text x="69" y="17" text-anchor="middle" font-family="'Atkinson Hyperlegible', sans-serif" font-size="12" fill="#fffdf8" opacity="0.9">words of desk space</text>
    </g>

    <!-- dust motes drifting away from the bottom of the stack, unnoticed -->
    <g class="ink-soft" opacity="0.45">
      <circle cx="-120" cy="330" r="3"/>
      <circle cx="-145" cy="316" r="2"/>
      <circle cx="-100" cy="345" r="2.5"/>
      <circle cx="-165" cy="336" r="1.8"/>
      <circle cx="150" cy="322" r="2.5"/>
      <circle cx="175" cy="336" r="2"/>
      <circle cx="130" cy="348" r="1.8"/>
      <circle cx="195" cy="312" r="1.6"/>
    </g>
  </g>

  <text x="400" y="386" text-anchor="middle" class="body" font-size="16">The bottom of the stack is already turning to dust — nobody at the desk notices.</text>
</svg>
